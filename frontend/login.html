<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeArena - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos específicos para el login */
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, 
                #ff0000, #ff7f00, #ffff00, #00ff00, 
                #0000ff, #4b0082, #9400d3);
            background-size: 400% 400%;
            animation: arcoiris 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        @keyframes arcoiris {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 2.5em;
        }

        .subtitulo {
            color: #666;
            margin-bottom: 30px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-google {
            background-color: #4285f4;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google::before {
            content: "G";
            background: white;
            color: #4285f4;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .btn-usuario {
            background-color: #4CAF50;
            color: white;
        }

        .btn-crear {
            background-color: #2196F3;
            color: white;
        }

        .btn-ignorar {
            background-color: #9e9e9e;
            color: white;
        }

        .separador {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #999;
        }

        .separador::before,
        .separador::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        .separador span {
            margin: 0 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .input-group {
            display: none;
            margin-top: 15px;
        }

        .input-group.active {
            display: block;
        }

        .btn-accion {
            background-color: #FF9800;
            color: white;
        }

        .mensaje {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🏆 CubeArena</h1>
        <div class="subtitulo">Graba tus solves y mejora tu técnica</div>

        <!-- Botón de Google (la única funcional real) -->
        <button class="btn btn-google" id="btnGoogle">
            Iniciar sesión con Google
        </button>

        <div class="separador">
            <span>o</span>
        </div>

        <!-- Opción: Usuario existente -->
        <button class="btn btn-usuario" id="btnUsuarioExistente">
            📝 Iniciar con nombre de usuario
        </button>

        <!-- Input para usuario existente (aparece al hacer clic) -->
        <div id="usuarioExistenteGroup" class="input-group">
            <input type="text" id="nombreUsuario" placeholder="Tu nombre de usuario">
            <button class="btn btn-accion" id="btnConfirmarUsuario">Continuar</button>
        </div>

        <!-- Opción: Crear usuario -->
        <button class="btn btn-crear" id="btnCrearUsuario">
            ✨ Crear nuevo nombre de usuario
        </button>

        <!-- Input para crear usuario (aparece al hacer clic) -->
        <div id="crearUsuarioGroup" class="input-group">
            <input type="text" id="nuevoNombre" placeholder="Nuevo nombre de usuario">
            <button class="btn btn-accion" id="btnConfirmarCrear">Crear y continuar</button>
        </div>

        <!-- Opción: Ignorar -->
        <button class="btn btn-ignorar" id="btnIgnorar">
            🔓 Continuar sin iniciar sesión
        </button>

        <div class="mensaje" id="mensaje"></div>
    </div>

    <script src="login.js"></script>
</body>
</html>
